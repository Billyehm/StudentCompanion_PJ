<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Rep Panel - Announcements</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .panel-section {
      background: var(--surface-strong);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .section-title {
      font-size: 1.2em;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: var(--surface-soft);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .btn {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.3);
    }

    .btn.secondary {
      background: var(--secondary);
      color: #000;
    }

    .btn.secondary:hover {
      background: #0ea5e9;
    }

    .announcement-history {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .announcement-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .announcement-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .announcement-empty {
      color: var(--muted);
      text-align: center;
      padding: 20px 10px;
    }

    .notification {
      background: rgba(34, 197, 94, 0.1);
      border-left: 4px solid var(--primary);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .notification.success {
      border-left-color: var(--primary);
      background: rgba(34, 197, 94, 0.1);
    }

    .notification.error {
      border-left-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    .access-prompt {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <nav class="navbar">
        <div class="brand">
          <span class="brand-mark">SC</span>
          <div class="brand-copy">
            <h2>Student Companion</h2>
            <p>Course Representative Panel</p>
          </div>
        </div>

        <button class="nav-toggle" type="button" aria-label="Toggle navigation" data-nav-toggle>Menu</button>

                <div class="nav-links" data-nav-links id="nav-menu">
          <a class="nav-link" href="dashboard.html">Home</a>
          <a class="nav-link" href="attendance.html">Attendance</a>
          <a class="nav-link" href="directory.html">Directory</a>
          <a class="nav-link" href="results.html">Results</a>
          <a class="nav-link" href="medical.html">Medical</a>
          <a class="nav-link" href="chatbot.html">AI Assistant</a>
          <a class="nav-link" href="course-rep.html">Course Rep</a>
          <a class="nav-link" href="profile.html">Profile</a>
          <a class="nav-link" href="timetable.html">Timetable</a>
          <a class="nav-link" href="lecturer-qr.html">Generate QR</a>
          <a class="nav-link" href="lecturer-attendance.html">View Attendance</a>
        </div>

        <div class="profile-panel">
          <button id="logout-btn" class="logout-button" type="button" aria-label="Logout">Logout</button>
        </div>
      </nav>
    </header>

    <main class="container">
      <section>
        <h1>👨‍🏫 Course Representative Panel</h1>
        <div id="notification"></div>

        <div id="course-rep-profile-prompt" class="panel-section access-prompt" hidden>
          <div class="section-title">
            Complete Your Profile
          </div>
          <p id="course-rep-prompt-text" style="display: none;"></p>
          <a class="btn" href="profile.html" style="display: inline-block; width: auto; text-decoration: none;">Update Profile</a>
        </div>

        <div class="panel-section" id="course-rep-form-section">
          <div class="section-title">
            📢 Send Announcement
          </div>
          <p id="announcementAudience" style="display: none;"></p>
          <form id="announcementForm" onsubmit="sendAnnouncement(event)">
            <div class="form-group">
              <label for="courseCode">Course Code *</label>
              <input type="text" id="courseCode" placeholder="e.g., CS101" required pattern="[A-Za-z]{2,}-?\d{2,}" />
            </div>

            <div class="form-group">
              <label for="announcementText">Announcement Message *</label>
              <textarea 
                id="announcementText" 
                placeholder="Inform your class about venue changes, assignments, etc..." 
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label for="announcementType">Announcement Type</label>
              <select id="announcementType">
                <option value="general">General Update</option>
                <option value="venue_change">Venue/Location Change</option>
                <option value="assignment">Assignment Notice</option>
                <option value="exam">Exam Information</option>
                <option value="urgent">Urgent Notice</option>
              </select>
            </div>

            <div class="form-group">
              <label for="announcementExpiryValue">Top Ribbon Duration *</label>
              <div style="display: grid; grid-template-columns: minmax(0, 1fr) 160px; gap: 12px;">
                <input type="number" id="announcementExpiryValue" min="1" value="1" required />
                <select id="announcementExpiryUnit">
                  <option value="hours">Hours</option>
                  <option value="minutes">Minutes</option>
                  <option value="days">Days</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn secondary">Send Announcement</button>
          </form>
          <div class="announcement-history" id="announcementHistory"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/course-rep.js"></script>
</body>
</html>
