<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Student Companion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="center-box">
      <div class="auth-header">
        <span class="badge">Account recovery</span>
        <h2>Reset Password</h2>
        <p>Enter the email on your account and we will send you a reset link.</p>
      </div>

      <form id="forgot-password-form" class="field-grid">
        <div class="field-group">
          <label for="reset-email">Email</label>
          <input id="reset-email" type="email" placeholder="you@example.com" required>
        </div>

        <button class="btn btn-block" type="submit">Reset Password</button>
      </form>

      <p id="forgot-password-message" class="message"></p>
      <p class="form-note">Remembered your password? <a href="login.html">Back to login</a></p>
    </section>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/forgot-password.js"></script>
</body>
</html>
