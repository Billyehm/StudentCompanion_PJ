<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Companion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="center-box">
      <div class="auth-header">
        <span class="badge">Welcome back</span>
        <h2>Login</h2>
        <p>Access your attendance, courses, and performance tools in one place.</p>
      </div>

      <form id="login-form" class="field-grid">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required>
        </div>

        <div class="field-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Enter your password" required>
        </div>

        <div class="auth-actions">
          <button class="btn btn-block" type="submit">Login</button>
        </div>
      </form>

      <p id="login-message" class="message"></p>
      <p class="form-note"><a href="forgot-password.html">Forgot your password?</a></p>
      <p class="form-note">Don't have an account? <a href="register.html">Register as a Student</a></p>
    </section>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
