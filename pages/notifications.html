<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <style>
    .notification-list {
      display: grid;
      gap: 10px;
    }

    .notification-item {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      border-radius: 16px;
      padding: 12px 13px;
    }

    .notification-item.expired {
      opacity: 0.78;
      border-style: dashed;
    }

    .notification-meta {
      display: flex;
      justify-content: space-between;
      gap: 6px 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .notification-text {
      color: var(--text);
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .notification-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .notification-empty {
      color: var(--muted);
      text-align: center;
      padding: 30px 10px;
    }

    .notification-prompt {
      margin-bottom: 1rem;
    }

    @media (max-width: 720px) {
      .notification-item {
        padding: 11px 12px;
      }

      .notification-text {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <nav class="navbar">
        <div class="brand">
          <span class="brand-mark">SC</span>
          <div class="brand-copy">
            <h2>Notifications</h2>
            <p>Class rep announcements</p>
          </div>
        </div>

        <button class="nav-toggle" type="button" aria-label="Toggle navigation" data-nav-toggle>Menu</button>

        <div class="nav-links" data-nav-links id="nav-menu">
          <a class="nav-link" href="dashboard.html">Home</a>
        </div>

        <div class="profile-panel">
          <button id="logout-btn" class="logout-button" type="button" aria-label="Logout">Logout</button>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="page-intro">
        <div>
          <h2>Announcements</h2>
          <p>Your class updates and direct messages appear here.</p>
        </div>
        <span class="badge" id="announcement-count">0 total</span>
      </section>

      <section id="notifications-profile-prompt" class="card notification-prompt" hidden>
        <h3>Complete Your Profile</h3>
        <p id="notifications-prompt-text" class="muted" hidden></p>
        <a class="btn" href="profile.html">Update Profile</a>
      </section>

      <section class="card">
        <div id="notification-list" class="notification-list"></div>
      </section>
    </main>
  </div>

  <script src="../js/shared.js"></script>
  <script src="../js/notifications.js"></script>
</body>
</html>
