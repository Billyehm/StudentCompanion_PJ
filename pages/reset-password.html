<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose New Password - Student Companion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="center-box">
      <div class="auth-header">
        <span class="badge">Email verified</span>
        <h2>Choose New Password</h2>
        <p>Enter your new password below to finish resetting your account.</p>
      </div>

      <form id="reset-password-form" class="field-grid">
        <div class="field-group">
          <label for="new-password">New Password</label>
          <input id="new-password" type="password" placeholder="Enter a new password" required>
        </div>

        <div class="field-group">
          <label for="confirm-password">Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Confirm your new password" required>
        </div>

        <button class="btn btn-block" type="submit">Save New Password</button>
      </form>

      <p id="reset-password-message" class="message"></p>
      <p class="form-note"><a href="login.html">Go back to Student Companion</a></p>
    </section>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/reset-password.js"></script>
</body>
</html>
